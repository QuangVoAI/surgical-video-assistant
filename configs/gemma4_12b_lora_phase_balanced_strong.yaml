model:
  name: google/gemma-4-12B
  processor_name: google/gemma-4-12B-it
  load_in_4bit: true
  gradient_checkpointing: true

data:
  train_jsonl: data/processed/processed_dataset_phase_balanced_strong.jsonl
  eval_jsonl: data/processed/processed_dataset_phase_balanced_strong.jsonl
  train_splits: ["train"]
  eval_splits: ["val", "test"]
  max_train_samples: 980
  max_eval_samples: 500

training:
  output_dir: checkpoints/gemma4-12b-surgical-phase-balanced-strong
  logging_dir: reports/training_logs/gemma4-12b-phase-balanced-strong
  num_train_epochs: 1
  max_steps: 650
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.000015
  warmup_ratio: 0.05
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  eval_steps: 100
  fp16: false
  bf16: true
  seed: 13

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: all-linear
  modules_to_save: ["lm_head", "embed_tokens"]
