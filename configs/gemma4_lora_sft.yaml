model:
  name: google/gemma-4-12b-it
  load_in_4bit: true
  gradient_checkpointing: true

data:
  train_jsonl: data/processed/processed_dataset.jsonl
  eval_jsonl: data/processed/processed_dataset.jsonl
  image_root:
  max_train_samples:
  max_eval_samples: 256

training:
  output_dir: checkpoints/gemma4-surgical-frame-lora
  logging_dir: reports/training_logs
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00002
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 250
  save_total_limit: 3
  eval_steps: 250
  fp16: false
  bf16: true
  seed: 13

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
