model:
  name: google/gemma-4-26B-A4B
  processor_name: google/gemma-4-26B-A4B-it
  load_in_4bit: true
  gradient_checkpointing: true

data:
  train_jsonl: data/processed/processed_dataset.jsonl
  eval_jsonl: data/processed/processed_dataset.jsonl
  train_splits: ["train"]
  eval_splits: ["val", "test"]
  max_train_samples:
  max_eval_samples: 256

training:
  output_dir: checkpoints/gemma4-26b-a4b-surgical-frame-lora
  logging_dir: reports/training_logs/gemma4-26b-a4b
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.00002
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 250
  save_total_limit: 3
  eval_steps: 250
  fp16: false
  bf16: true
  seed: 13

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
  modules_to_save: ["lm_head", "embed_tokens"]
