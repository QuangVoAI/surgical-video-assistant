model:
  name: google/gemma-4-12B
  processor_name: google/gemma-4-12B-it
  load_in_4bit: true
  gradient_checkpointing: true

data:
  train_jsonl: data/processed/processed_dataset_fast.jsonl
  eval_jsonl: data/processed/processed_dataset_fast.jsonl
  train_splits: ["train"]
  eval_splits: ["val", "test"]
  max_train_samples: 400
  max_eval_samples: 120

training:
  output_dir: checkpoints/gemma4-12b-surgical-frame-lora-tiny
  logging_dir: reports/training_logs/gemma4-12b-tiny
  num_train_epochs: 1
  max_steps: 100
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.00003
  warmup_ratio: 0.03
  logging_steps: 5
  save_steps: 25
  save_total_limit: 2
  eval_steps: 25
  fp16: false
  bf16: true
  seed: 13

lora:
  r: 4
  alpha: 8
  dropout: 0.05
  target_modules: all-linear
  modules_to_save: ["lm_head", "embed_tokens"]
